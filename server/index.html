<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta name="theme-color" content="#111827">

    <title>ESP32 Internet Mic</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family:
                Inter,
                system-ui,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
            color: #f9fafb;
            background:
                radial-gradient(
                    circle at top,
                    #243047,
                    #111827 55%
                );
        }

        main {
            width: min(100%, 620px);
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            background: rgba(31, 41, 55, 0.92);
            box-shadow:
                0 24px 70px rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(16px);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 8vw, 3.2rem);
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .subtitle {
            margin: 12px 0 28px;
            color: #9ca3af;
            line-height: 1.6;
        }

        .status-card {
            display: grid;
            gap: 16px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(17, 24, 39, 0.72);
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .label {
            color: #9ca3af;
        }

        [data-state="connected"] {
            color: #4ade80;
        }

        [data-state="connecting"] {
            color: #facc15;
        }

        [data-state="disconnected"] {
            color: #f87171;
        }

        .meter {
            margin-top: 24px;
        }

        .meter-heading {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        progress {
            display: block;
            width: 100%;
            height: 18px;
            overflow: hidden;
            border: 0;
            border-radius: 999px;
            background: #111827;
        }

        progress::-moz-progress-bar {
            border-radius: 999px;
            background:
                linear-gradient(
                    90deg,
                    #22c55e,
                    #eab308,
                    #ef4444
                );
        }

        progress::-webkit-progress-bar {
            border-radius: 999px;
            background: #111827;
        }

        progress::-webkit-progress-value {
            border-radius: 999px;
            background:
                linear-gradient(
                    90deg,
                    #22c55e,
                    #eab308,
                    #ef4444
                );
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 28px;
        }

        button {
            min-height: 52px;
            border: 0;
            border-radius: 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition:
                transform 120ms ease,
                opacity 120ms ease;
        }

        button:not(:disabled):active {
            transform: scale(0.98);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        #startButton {
            color: #052e16;
            background: #4ade80;
        }

        #stopButton {
            color: #f9fafb;
            background: #374151;
        }

        .note {
            margin: 22px 0 0;
            color: #9ca3af;
            font-size: 0.9rem;
            line-height: 1.5;
            text-align: center;
        }

        @media (max-width: 480px) {
            main {
                padding: 24px;
            }

            .buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main>
        <h1>Internet Mic</h1>

        <p class="subtitle">
            Live audio streamed from an ESP32-S3
            and INMP441 microphone.
        </p>

        <section class="status-card">
            <div class="status-row">
                <span class="label">Player</span>

                <strong
                    id="connectionStatus"
                    data-state="disconnected"
                >
                    Press Start Listening
                </strong>
            </div>

            <div class="status-row">
                <span class="label">Microphone</span>

                <strong
                    id="microphoneStatus"
                    data-state="disconnected"
                >
                    Disconnected
                </strong>
            </div>

            <div class="status-row">
                <span class="label">Listeners</span>

                <strong id="listenerCount">0</strong>
            </div>
        </section>

        <section class="meter">
            <div class="meter-heading">
                <span class="label">Audio level</span>
                <strong id="levelText">0%</strong>
            </div>

            <progress
                id="audioLevel"
                value="0"
                max="100"
            ></progress>
        </section>

        <div class="buttons">
            <button id="startButton" type="button">
                Start Listening
            </button>

            <button
                id="stopButton"
                type="button"
                disabled
            >
                Stop
            </button>
        </div>

        <p class="note">
            Browsers require a button press before
            allowing audio playback.
        </p>
    </main>

    <script src="/player.js"></script>
</body>
</html>
